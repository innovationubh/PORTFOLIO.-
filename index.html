
    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Device Pre-Book</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff8f0;
  color: #111;
  scroll-behavior: smooth;
  text-align: center;
}

.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

h1 { font-size: 42px; margin-bottom: 10px; }
h2 { font-size: 26px; margin-bottom: 20px; }
p { font-size: 18px; max-width: 700px; line-height: 1.5; margin-bottom: 25px; }

img {
  max-width: 300px;
  margin: 20px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.15);
  cursor: pointer;
}

/* Buttons */
.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 20px;
  background: #ffb703;
  font-size: 16px;
  cursor: pointer;
  margin: 10px;
}
.btn:hover { background: #ffd166; }

/* Input fields */
input { padding: 10px; font-size: 16px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; }

/* Confetti/Balloons */
canvas { position: fixed; pointer-events: none; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; }

/* Admin page */
#adminPage { display: none; }
</style>
</head>
<body>

<div class="section">
  <h1>INNOVATIONUBH</h1>
  <h2>Pre-Book Your Device</h2>
  <p>Collecting early interest helps us improve our devices! Fill your details and tap Pre-Book.</p>

  <input type="text" id="name" placeholder="Your Name">
  <input type="email" id="email" placeholder="Your Email">
  <br>
  <button class="btn" onclick="preBook()">Pre-Book</button>
  <p id="popupMsg" style="font-weight:bold;color:green;margin-top:10px;"></p>

  <button class="btn" onclick="openAdmin()">Admin Panel</button>
</div>

<!-- ADMIN PAGE -->
<div class="section" id="adminPage">
  <h1>Admin Panel</h1>
  <input type="password" id="adminPass" placeholder="Enter password">
  <button class="btn" onclick="checkAdmin()">Login</button>
  <div id="adminData" style="margin-top:20px;"></div>
  <button class="btn" onclick="closeAdmin()">⬅ Back</button>
</div>

<canvas id="confetti"></canvas>

<script>
// Visitor & Pre-book Tracking
let visitors = 0;
let preBooks = 0;
let preBookers = [];

// Load from localStorage
if(localStorage.getItem("visitors")) visitors = parseInt(localStorage.getItem("visitors"));
if(localStorage.getItem("preBooks")) preBooks = parseInt(localStorage.getItem("preBooks"));
if(localStorage.getItem("preBookers")) preBookers = JSON.parse(localStorage.getItem("preBookers"));

// Pre-Book Function
function preBook() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  if(!name || !email) {
    alert("Please enter both name and email.");
    return;
  }

  visitors++;
  preBooks++;
  preBookers.push({name, email, date: new Date().toLocaleString()});
  localStorage.setItem("visitors", visitors);
  localStorage.setItem("preBooks", preBooks);
  localStorage.setItem("preBookers", JSON.stringify(preBookers));

  document.getElementById("popupMsg").innerText = "We will notify you! 🎉";
  launchConfetti();
  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
}

// Admin Functions
function openAdmin() { document.getElementById("adminPage").style.display = "flex"; }
function closeAdmin() { document.getElementById("adminPage").style.display = "none"; }
function checkAdmin() {
  const pass = document.getElementById("adminPass").value;
  if(pass === "firststartup") {
    let html = `<p>Total Visitors: ${visitors}</p>`;
    html += `<p>Total Pre-Books: ${preBooks}</p>`;
    html += "<h3>Pre-Booker Details:</h3><ul>";
    preBookers.forEach(pb => html += `<li>${pb.date} - ${pb.name} (${pb.email})</li>`);
    html += "</ul>";
    document.getElementById("adminData").innerHTML = html;
  } else { alert("Incorrect password"); }
}

// Confetti/Balloons Animation
function launchConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ["#ff4b5c","#ffb703","#ffdf00","#00b4d8","#8ac926"];

  for(let i=0;i<100;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      radius: Math.random()*6+4,
      color: colors[Math.floor(Math.random()*colors.length)],
      speedY: Math.random()*4+2,
      speedX: Math.random()*2-1
    });
  }

  let frame = 0;
  function animate(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.y += p.speedY;
      p.x += p.speedX;
      ctx.beginPath();
      ctx.fillStyle = p.color;
      ctx.arc(p.x,p.y,p.radius,0,2*Math.PI);
      ctx.fill();
    });
    if(frame<100){ requestAnimationFrame(animate); }
  }
  animate();
}
</script>
</body>
</html>
